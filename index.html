<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🦉</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WattWisePH - Philippine Electricity & Appliance Bill Calculator</title>
    <meta name="description" content="Calculate and estimate your monthly home electricity bill in the Philippines based on Meralco rates and appliance usage." />
    <!-- FOUC Prevention Script for Dark Mode -->
    <script>
      (function() {
        const theme = localStorage.getItem("wattwise-theme");
        const systemDark = window.matchMedia("(prefers-color-scheme: dark)").matches;
        if (theme === "dark" || (!theme && systemDark)) {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      })();
    </script>
  </head>
  <body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-50 transition-colors duration-300 min-h-screen">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
